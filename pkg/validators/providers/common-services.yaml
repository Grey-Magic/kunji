- name: sendgrid
  category: email
  key_prefixes: ["SG."]
  key_patterns: ["(?i)^SG\\.[a-zA-Z0-9_-]{22}\\.[a-zA-Z0-9_-]{43}$"]
  validation:
    method: GET
    url: "https://api.sendgrid.com/v3/scopes"
    auth: "bearer"
  metadata:
    - method: GET
      url: "https://api.sendgrid.com/v3/user/profile"
      auth: "bearer"
      extract: "email"
      store_as: "email"

- name: stripe
  category: payments
  key_prefixes: ["sk_live_", "sk_test_"]
  key_patterns: ["(?i)^sk_(live|test)_[a-zA-Z0-9]{24,99}$"]
  validation:
    method: GET
    url: "https://api.stripe.com/v1/charges?limit=1"
    auth: "basic"
  metadata:
    - method: GET
      url: "https://api.stripe.com/v1/account"
      auth: "basic"
      extract: "email"
      store_as: "email"
    - method: GET
      url: "https://api.stripe.com/v1/account"
      auth: "basic"
      extract: "settings.dashboard.display_name"
      store_as: "name"

- name: cloudflare
  category: infrastructure
  key_prefixes: ["cloudflare_"]
  key_patterns: ["^cloudflare_[a-f0-9]{37}$"]
  validation:
    method: GET
    url: "https://api.cloudflare.com/client/v4/user/tokens/verify"
    auth: "bearer"
  metadata:
    - method: GET
      url: "https://api.cloudflare.com/client/v4/user"
      auth: "bearer"
      extract: "email"
      store_as: "email"

- name: npm
  category: developer
  key_prefixes: ["npm_"]
  key_patterns: ["(?i)^npm_[a-zA-Z0-9]{36}$"]
  validation:
    method: GET
    url: "https://registry.npmjs.org/-/whoami"
    auth: "bearer"
    metadata_from_validation:
      name_path: "username"

- name: opsgenie
  category: monitoring
  key_patterns: ["(?i)^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$"]
  validation:
    method: GET
    url: "https://api.opsgenie.com/v2/users/me"
    auth: "header:Authorization"
    headers:
      Authorization: "GenieKey {{key}}"
    metadata_from_validation:
      name_path: "data.username"
      email_path: "data.fullName"

- name: dropbox
  category: storage
  key_prefixes: ["sl."]
  key_patterns: ["^sl\\.[a-zA-Z0-9_-]{130,150}$"]
  validation:
    method: POST
    url: "https://api.dropboxapi.com/2/users/get_current_account"
    auth: "bearer"
    headers:
      Content-Type: "application/json"
    body: "null"
    metadata_from_validation:
      name_path: "name.display_name"
      email_path: "email"

- name: lokalise
  category: localization
  key_prefixes: ["lo-"]
  key_patterns: ["^lo-[a-f0-9]{40}$"]
  validation:
    method: GET
    url: "https://api.lokalise.com/api2/projects/"
    auth: "header:x-api-token"
    metadata_from_validation:
      name_path: "projects.0.name"

- name: ipstack
  category: api
  key_prefixes: ["ipstack_"]
  key_patterns: ["^ipstack_[a-f0-9]{32}$"]
  validation:
    method: GET
    url: "https://api.ipstack.com/check"
    auth: "query:access_key"
    metadata_from_validation:
      name_path: "country_name"
      email_path: "city"

- name: paypal
  category: payments
  key_patterns: ["^[a-zA-Z0-9_-]{80}:[a-zA-Z0-9_-]{80}$"]
  validation:
    method: POST
    url: "https://api.sandbox.paypal.com/v1/oauth2/token"
    auth: "basic_composite"
    headers:
      Accept: "application/json"
      Content-Type: "application/x-www-form-urlencoded"
    body: "grant_type=client_credentials"
  metadata:
    - method: GET
      url: "https://api.sandbox.paypal.com/v1/identity/oauth2/userinfo?schema=paypalv1.1"
      auth: "bearer"
      headers:
        Authorization: "Bearer {{extract.access_token}}"
      extract: "emails.0.value"
      store_as: "email"
    - method: GET
      url: "https://api.sandbox.paypal.com/v1/identity/oauth2/userinfo?schema=paypalv1.1"
      auth: "bearer"
      headers:
        Authorization: "Bearer {{extract.access_token}}"
      extract: "name"
      store_as: "name"

- name: square
  category: payments
  key_patterns: ["(?i)^sq0[a-z]{3}-[0-9A-Za-z\\-_]{15,45}:[a-zA-Z0-9]{15,65}$"]
  validation:
    method: GET
    url: "https://connect.squareup.com/v2/locations"
    auth: "header:Authorization"
    headers:
      Authorization: "Bearer {{key.secret}}"
  metadata_from_validation:
    name_path: "locations.0.name"

- name: github
  category: developer
  key_prefixes: ["ghp_", "gho_", "ghu_", "ghs_", "ghr_", "github_pat_", "ghcr_"]
  key_patterns: ["^(gh[pousr]_[a-zA-Z0-9]{36}|github_pat_[a-zA-Z0-9]{22}_[a-zA-Z0-9]{59}|ghcr_[a-zA-Z0-9]{36})$"]
