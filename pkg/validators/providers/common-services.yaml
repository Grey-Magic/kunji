- name: sendgrid
  category: email
  key_prefixes: ["SG."]
  key_patterns: ["(?i)^SG\\.[a-zA-Z0-9_-]{22}\\.[a-zA-Z0-9_-]{43}$"]
  validation:
    method: GET
    url: "https://api.sendgrid.com/v3/scopes"
    auth: "bearer"
  metadata:
    - method: GET
      url: "https://api.sendgrid.com/v3/user/profile"
      auth: "bearer"
      extract: "email"
      store_as: "email"

- name: stripe
  category: payments
  key_prefixes: ["sk_live_"]
  key_patterns: ["(?i)^sk_live_[a-zA-Z0-9]{24,99}$"]
  validation:
    method: GET
    url: "https://api.stripe.com/v1/charges?limit=1"
    auth: "basic"
  metadata:
    - method: GET
      url: "https://api.stripe.com/v1/account"
      auth: "basic"
      extract: "email"
      store_as: "email"
    - method: GET
      url: "https://api.stripe.com/v1/account"
      auth: "basic"
      extract: "settings.dashboard.display_name"
      store_as: "name"

- name: cloudflare
  category: infrastructure
  key_patterns: ["^[a-zA-Z0-9_-]{35,45}$"]
  validation:
    method: GET
    url: "https://api.cloudflare.com/client/v4/user/tokens/verify"
    auth: "bearer"
  metadata:
    - method: GET
      url: "https://api.cloudflare.com/client/v4/user"
      auth: "bearer"
      extract: "email"
      store_as: "email"

- name: npm
  category: developer
  key_prefixes: ["npm_"]
  key_patterns: ["(?i)^npm_[a-zA-Z0-9]{36}$"]
  validation:
    method: GET
    url: "https://registry.npmjs.org/-/whoami"
    auth: "bearer"
    metadata_from_validation:
      name_path: "username"

- name: opsgenie
  category: monitoring
  key_patterns: ["(?i)^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$"]
  validation:
    method: GET
    url: "https://api.opsgenie.com/v2/users/me"
    auth: "header:Authorization"
    headers:
      Authorization: "GenieKey {{key}}"
    metadata_from_validation:
      name_path: "data.username"
      email_path: "data.fullName"

- name: dropbox
  category: storage
  key_prefixes: ["sl."]
  key_patterns: ["^sl\\.[a-zA-Z0-9_-]{130,150}$"]
  validation:
    method: POST
    url: "https://api.dropboxapi.com/2/users/get_current_account"
    auth: "bearer"
    headers:
      Content-Type: "application/json"
    body: "null"
    metadata_from_validation:
      name_path: "name.display_name"
      email_path: "email"

- name: lokalise
  category: localization
  key_patterns: ["^[a-f0-9]{40}$"]
  validation:
    method: GET
    url: "https://api.lokalise.com/api2/projects/"
    auth: "header:x-api-token"
    metadata_from_validation:
      name_path: "projects.0.name"

- name: ipstack
  category: api
  key_patterns: ["^[a-f0-9]{32}$"]
  validation:
    method: GET
    url: "https://api.ipstack.com/check"
    auth: "query:access_key"
    metadata_from_validation:
      name_path: "country_name"
      email_path: "city"

- name: paypal
  category: payments
  key_patterns: ["^[a-zA-Z0-9_-]{80}:[a-zA-Z0-9_-]{80}$"]
  validation:
    method: POST
    url: "https://api.sandbox.paypal.com/v1/oauth2/token"
    auth: "basic_composite"
    headers:
      Accept: "application/json"
      Content-Type: "application/x-www-form-urlencoded"
    body: "grant_type=client_credentials"
  metadata:
    - method: GET
      url: "https://api.sandbox.paypal.com/v1/identity/oauth2/userinfo?schema=paypalv1.1"
      auth: "bearer"
      headers:
        Authorization: "Bearer {{extract.access_token}}"
      extract: "emails.0.value"
      store_as: "email"
    - method: GET
      url: "https://api.sandbox.paypal.com/v1/identity/oauth2/userinfo?schema=paypalv1.1"
      auth: "bearer"
      headers:
        Authorization: "Bearer {{extract.access_token}}"
      extract: "name"
      store_as: "name"
      
- name: square
  category: payments
  key_patterns: ["(?i)^sq0[a-z]{3}-[0-9A-Za-z\\-_]{15,45}:[a-zA-Z0-9]{15,65}$"]
  validation:
    method: GET
    url: "https://connect.squareup.com/v2/locations"
    auth: "header:Authorization"
    headers:
      Authorization: "Bearer {{key.secret}}"
  metadata_from_validation:
    name_path: "locations.0.name"

- name: github
  category: developer
  key_prefixes: ["ghp_", "gho_", "ghu_", "ghs_", "ghr_", "github_pat_"]
  key_patterns: ["^(gh[pousr]_[a-zA-Z0-9]{36}|github_pat_[a-zA-Z0-9]{22}_[a-zA-Z0-9]{59})$"]
  validation:
    method: GET
    url: "https://api.github.com/user"
    auth: "bearer"
    metadata_from_validation:
      name_path: "login"
      email_path: "email"

- name: twilio
  category: communication
  key_prefixes: ["AC"]
  key_patterns: ["(?i)^AC[a-f0-9]{32}:[a-f0-9]{32}$"]
  validation:
    method: GET
    url: "https://api.twilio.com/2010-04-01/Accounts/{{key.client_id}}.json"
    auth: "basic_composite"
    metadata_from_validation:
      name_path: "friendly_name"

- name: heroku
  category: infrastructure
  key_patterns: ["(?i)^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"]
  validation:
    method: GET
    url: "https://api.heroku.com/account"
    auth: "bearer"
    headers:
      Accept: "application/vnd.heroku+json; version=3"
    metadata_from_validation:
      name_path: "name"
      email_path: "email"

- name: pagerduty
  category: monitoring
  key_prefixes: ["u+"]
  key_patterns: ["^[a-zA-Z0-9_\\-\\+]{20}$"]
  validation:
    method: GET
    url: "https://api.pagerduty.com/users/me"
    auth: "header:Authorization"
    headers:
      Authorization: "Token token={{key}}"
      Accept: "application/vnd.pagerduty+json;version=2"
    metadata_from_validation:
      name_path: "user.name"
      email_path: "user.email"

- name: asana
  category: productivity
  key_patterns: ["^1/[0-9]+:[a-zA-Z0-9]{32,64}$"]
  validation:
    method: GET
    url: "https://app.asana.com/api/1.0/users/me"
    auth: "bearer"
    metadata_from_validation:
      name_path: "data.name"
      email_path: "data.email"

- name: datadog
  category: monitoring
  key_patterns: ["(?i)^[a-f0-9]{32}$"]
  validation:
    method: GET
    url: "https://api.datadoghq.com/api/v1/user/me"
    auth: "header:DD-API-KEY"
    headers:
      DD-API-KEY: "{{key}}"
  metadata_from_validation:
    name_path: "handle"
    email_path: "email"

- name: telegram
  category: communication
  key_patterns: ["^[0-9]{8,10}:[a-zA-Z0-9_-]{35}$"]
  validation:
    method: GET
    url: "https://api.telegram.org/bot{{key}}/getMe"
    auth: "none"
    metadata_from_validation:
      name_path: "result.username"

- name: notion
  category: productivity
  key_prefixes: ["secret_"]
  key_patterns: ["^secret_[a-zA-Z0-9]{43}$"]
  validation:
    method: GET
    url: "https://api.notion.com/v1/users/me"
    auth: "bearer"
    headers:
      Notion-Version: "2022-06-28"
    metadata_from_validation:
      name_path: "name"
      email_path: "bot.owner.user.person.email"

- name: supabase
  category: database
  key_prefixes: ["sbp_"]
  key_patterns: ["^sbp_[a-zA-Z0-9]{40}$"]
  validation:
    method: GET
    url: "https://api.supabase.com/v1/projects"
    auth: "bearer"
    metadata_from_validation:
      name_path: "0.name"

- name: saucelabs
  category: infrastructure
  key_patterns: ["^[a-zA-Z0-9_-]+:[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$"]
  validation:
    method: GET
    url: "https://saucelabs.com/rest/v1/users/{{key.client_id}}"
    auth: "basic_composite"
    metadata_from_validation:
      email_path: "email"
      name_path: "name"

- name: hubspot
  category: marketing
  key_patterns: ["^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$"]
  validation:
    method: GET
    url: "https://api.hubapi.com/owners/v2/owners"
    auth: "query:hapikey"
    metadata_from_validation:
      name_path: "0.firstName"
      email_path: "0.email"

- name: jumpcloud
  category: security
  key_patterns: ["^[a-f0-9]{40}$"]
  validation:
    method: GET
    url: "https://console.jumpcloud.com/api/systemusers"
    auth: "header:x-api-key"
    metadata_from_validation:
      name_path: "results.0.displayname"
      email_path: "results.0.email"

- name: mapbox
  category: api
  key_prefixes: ["sk.", "tk.", "pk."]
  key_patterns: ["^(sk|tk|pk)\\.[a-zA-Z0-9_-]+\\.[a-zA-Z0-9_-]+$"]
  validation:
    method: GET
    url: "https://api.mapbox.com/tokens/v2?access_token={{key}}"
    auth: "none"
    metadata_from_validation:
      name_path: "id"
      email_path: "usage"

- name: browserstack
  category: infrastructure
  key_patterns: ["^[a-zA-Z0-9]+:[a-zA-Z0-9]{20}$"]
  validation:
    method: GET
    url: "https://api.browserstack.com/automate/plan.json"
    auth: "basic_composite"
    metadata_from_validation:
      name_path: "automate_plan"

- name: wakatime
  category: developer
  key_patterns: ["^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$"]
  validation:
    method: GET
    url: "https://wakatime.com/api/v1/users/current"
    auth: "query:api_key"
    metadata_from_validation:
      name_path: "data.username"
      email_path: "data.email"

- name: spotify
  category: api
  key_patterns: ["^BQA[a-zA-Z0-9_-]{100,500}$"]
  validation:
    method: GET
    url: "https://api.spotify.com/v1/me"
    auth: "bearer"
    metadata_from_validation:
      name_path: "display_name"
      email_path: "email"

- name: circleci
  category: developer
  key_patterns: ["^[a-f0-9]{40}$"]
  validation:
    method: GET
    url: "https://circleci.com/api/v2/me"
    auth: "header:Circle-Token"
    metadata_from_validation:
      name_path: "name"
      email_path: "login"

- name: google_maps
  category: api
  key_prefixes: ["AIza"]
  key_patterns: ["^AIza[0-9A-Za-z_-]{35}$"]
  validation:
    method: GET
    url: "https://maps.googleapis.com/maps/api/geocode/json?latlng=40,30&key={{key}}"
    auth: "none"
  metadata_from_validation:
    name_path: "status"

- name: shodan
  category: security
  key_patterns: ["^[a-zA-Z0-9]{32}$"]
  validation:
    method: GET
    url: "https://api.shodan.io/account/profile"
    auth: "query:key"
    metadata_from_validation:
      name_path: "display_name"
      email_path: "member"

- name: twitter_secret
  category: api
  key_patterns: ["^[a-zA-Z0-9]{20,25}:[a-zA-Z0-9]{40,50}$"]
  validation:
    method: POST
    url: "https://api.twitter.com/oauth2/token"
    auth: "basic_composite"
    headers:
      Content-Type: "application/x-www-form-urlencoded"
    body: "grant_type=client_credentials"
  metadata_from_validation:
    name_path: "token_type"

- name: infura
  category: infrastructure
  key_patterns: ["^[a-f0-9]{32}$"]
  validation:
    method: POST
    url: "https://mainnet.infura.io/v3/{{key}}"
    auth: "none"
    headers:
      Content-Type: "application/json"
    body: '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}'

- name: deviantart_secret
  category: api
  key_patterns: ["^[0-9]{4,5}:[a-f0-9]{32}$"]
  validation:
    method: POST
    url: "https://www.deviantart.com/oauth2/token"
    auth: "none"
    headers:
      Content-Type: "application/x-www-form-urlencoded"
    body: "grant_type=client_credentials&client_id={{key.client_id}}&client_secret={{key.secret}}"
  metadata_from_validation:
    name_path: "token_type"

- name: deviantart_token
  category: api
  key_patterns: ["^[a-zA-Z0-9-_]{30,50}$"]
  validation:
    method: GET
    url: "https://www.deviantart.com/api/v1/user/whoami"
    auth: "bearer"
    metadata_from_validation:
      name_path: "username"

- name: pendo
  category: analytics
  key_patterns: ["^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$"]
  validation:
    method: GET
    url: "https://app.pendo.io/api/v1/feature"
    auth: "header:x-pendo-integration-key"
  metadata_from_validation:
    name_path: "0.name"

- name: contentful
  category: cms
  key_patterns: ["^[a-zA-Z0-9_-]{43}$"]
  validation:
    method: GET
    url: "https://api.contentful.com/spaces"
    auth: "bearer"
  metadata_from_validation:
    name_path: "items.0.name"

- name: mailgun
  category: email
  key_prefixes: ["key-"]
  key_patterns: ["^key-[a-f0-9]{32}$"]
  validation:
    method: GET
    url: "https://api.mailgun.net/v3/domains"
    auth: "basic_composite"
    # Basic auth translates to 'api:key-xxxxxx'
    metadata_from_validation:
      name_path: "items.0.name"

- name: newrelic_personal
  category: monitoring
  key_prefixes: ["NRAK-"]
  key_patterns: ["^NRAK-[a-zA-Z0-9]{27}$"]
  validation:
    method: POST
    url: "https://api.newrelic.com/graphql"
    auth: "header:API-Key"
    headers:
      Content-Type: "application/json"
    body: '{ "query":  "{ requestContext { userId apiKey } }"} '
    metadata_from_validation:
      name_path: "data.requestContext.userId"

- name: newrelic_rest
  category: monitoring
  key_patterns: ["^[a-f0-9]{40}$", "^[a-f0-9]{47}$"]
  validation:
    method: GET
    url: "https://api.newrelic.com/v2/applications.json"
    auth: "header:X-Api-Key"
    metadata_from_validation:
      name_path: "applications.0.name"

- name: salesforce
  category: crm
  key_patterns: ["^[A-Za-z0-9_.-]{40,100}$", "^00D[a-zA-Z0-9]{12}!.*$"]
  validation:
    method: GET
    url: "https://login.salesforce.com/services/data/v20.0/"
    auth: "bearer"
  metadata:
    - method: GET
      url: "https://login.salesforce.com/services/oauth2/userinfo"
      auth: "bearer"
      extract: "username"
      store_as: "name"
    - method: GET
      url: "https://login.salesforce.com/services/oauth2/userinfo"
      auth: "bearer"
      extract: "email"
      store_as: "email"

- name: algolia
  category: search
  key_patterns: ["^[a-zA-Z0-9]{32}:[a-zA-Z0-9]{32}$"]
  validation:
    method: GET
    url: "https://{{key.client_id}}-1.algolianet.com/1/indexes/"
    auth: "none"
    headers:
      x-algolia-api-key: "{{key.secret}}"
      x-algolia-application-id: "{{key.client_id}}"
    metadata_from_validation:
      name_path: "items.0.name"

- name: bitly
  category: api
  key_prefixes: ["BITL"]
  key_patterns: ["^[a-zA-Z0-9_-]{34,45}$"]
  validation:
    method: GET
    url: "https://api-ssl.bitly.com/v3/shorten"
    auth: "query:access_token"
    metadata_from_validation:
      name_path: "status_txt"

- name: buildkite
  category: developer
  key_patterns: ["^[a-zA-Z0-9_-]{20,40}$"]
  validation:
    method: GET
    url: "https://api.buildkite.com/v2/access-token"
    auth: "bearer"
    metadata_from_validation:
      name_path: "user.email"

- name: buttercms
  category: cms
  key_patterns: ["^[a-zA-Z0-9]{40,50}$"]
  validation:
    method: GET
    url: "https://api.buttercms.com/v2/posts/"
    auth: "query:auth_token"
  metadata_from_validation:
    name_path: "meta.count"

- name: zendesk_token
  category: api
  key_patterns: ["^[a-zA-Z0-9_-]{40,60}$"]
  validation:
    method: GET
    url: "https://{{key.client_id}}.zendesk.com/api/v2/tickets.json"
    auth: "bearer"
  metadata:
    - method: GET
      url: "https://{{key.client_id}}.zendesk.com/api/v2/users/me.json"
      auth: "bearer"
      extract: "user.email"
      store_as: "email"
    - method: GET
      url: "https://{{key.client_id}}.zendesk.com/api/v2/users/me.json"
      auth: "bearer"
      extract: "user.name"
      store_as: "name"

- name: zendesk_apikey
  category: api
  key_patterns: ["^[a-zA-Z0-9]{40}$"]
  validation:
    method: GET
    url: "https://{{key.client_id}}.zendesk.com/api/v2/users.json"
    auth: "basic_composite"
    # Composite key format: user@email/token:API_TOKEN
    # key.client_id = subdomain, key.secret = email/token:TOKEN
  metadata:
    - method: GET
      url: "https://{{key.client_id}}.zendesk.com/api/v2/users/me.json"
      auth: "basic_composite"
      extract: "user.email"
      store_as: "email"
    - method: GET
      url: "https://{{key.client_id}}.zendesk.com/api/v2/users/me.json"
      auth: "basic_composite"
      extract: "user.name"
      store_as: "name"

- name: mailchimp
  category: email
  key_patterns: ["^[a-z]{2}[0-9]+:[a-f0-9]{32}-[a-z]{2}[0-9]+$"]
  validation:
    method: GET
    url: "https://{{key.client_id}}.api.mailchimp.com/3.0/"
    auth: "basic_composite"
    # Composite key format: <datacenter>:<full_api_key>  e.g. us1:abcdef123456-us1
    metadata_from_validation:
      name_path: "account_name"
      email_path: "email"

- name: delighted
  category: api
  key_patterns: ["^[a-zA-Z0-9]{20,40}$"]
  validation:
    method: GET
    url: "https://api.delighted.com/v1/metrics.json"
    auth: "basic"
    metadata_from_validation:
      name_path: "url"

- name: travis_ci
  category: developer
  key_prefixes: ["travis"]
  key_patterns: ["^[a-zA-Z0-9_-]{22,30}$"]
  validation:
    method: GET
    url: "https://api.travis-ci.org/repos"
    auth: "header:Authorization"
    headers:
      Authorization: "token {{key}}"
      Travis-API-Version: "3"
  metadata:
    - method: GET
      url: "https://api.travis-ci.org/user"
      auth: "header:Authorization"
      headers:
        Authorization: "token {{key}}"
        Travis-API-Version: "3"
      extract: "login"
      store_as: "name"
    - method: GET
      url: "https://api.travis-ci.org/user"
      auth: "header:Authorization"
      headers:
        Authorization: "token {{key}}"
        Travis-API-Version: "3"
      extract: "email"
      store_as: "email"

- name: sonarcloud
  category: developer
  key_patterns: ["^[a-f0-9]{40}$"]
  validation:
    method: GET
    url: "https://sonarcloud.io/api/user/groups"
    auth: "basic"
    metadata_from_validation:
      name_path: "groups.0.name"

- name: instagram_graph
  category: social
  key_prefixes: ["EAAJ"]
  key_patterns: ["^EAA[a-zA-Z0-9]{100,500}$"]
  validation:
    method: GET
    url: "https://graph.facebook.com/v8.0/me/accounts"
    auth: "query:access_token"
    metadata_from_validation:
      name_path: "name"

- name: gitlab
  category: developer
  key_prefixes: ["glpat-"]
  key_patterns: ["^glpat-[a-zA-Z0-9_-]{20}$", "^[a-zA-Z0-9_-]{20}$"]
  validation:
    method: GET
    url: "https://gitlab.com/api/v4/user"
    auth: "query:private_token"
    metadata_from_validation:
      name_path: "username"
      email_path: "email"

- name: razorpay
  category: payments
  key_prefixes: ["rzp_live_"]
  key_patterns: ["^rzp_live_[a-zA-Z0-9]{14}:[a-zA-Z0-9]{24}$"]
  validation:
    method: GET
    url: "https://api.razorpay.com/v1/payments"
    auth: "basic_composite"

- name: freshdesk
  category: api
  key_patterns: ["^[a-zA-Z0-9]{20}$"]
  validation:
    method: GET
    url: "https://{{key.client_id}}.freshdesk.com/api/v2/tickets"
    auth: "basic_composite"
    # Composite key format: subdomain:API_KEY
  metadata:
    - method: GET
      url: "https://{{key.client_id}}.freshdesk.com/api/v2/agents/me"
      auth: "basic_composite"
      extract: "contact.email"
      store_as: "email"
    - method: GET
      url: "https://{{key.client_id}}.freshdesk.com/api/v2/agents/me"
      auth: "basic_composite"
      extract: "contact.name"
      store_as: "name"

- name: keenio
  category: analytics
  key_patterns: ["^[a-zA-Z0-9]{64}:[a-zA-Z0-9]{64}$"]
  validation:
    method: GET
    url: "https://api.keen.io/3.0/projects/{{key.client_id}}/events"
    auth: "query:api_key"

- name: calendly
  category: productivity
  key_patterns: ["^[a-zA-Z0-9_-]{40,60}$"]
  validation:
    method: GET
    url: "https://calendly.com/api/v1/users/me"
    auth: "header:X-TOKEN"
    metadata_from_validation:
      name_path: "resource.name"
      email_path: "resource.email"

- name: azure_app_insights
  category: monitoring
  key_patterns: ["^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}:[a-zA-Z0-9]{32,40}$"]
  validation:
    method: GET
    url: "https://api.applicationinsights.io/v1/apps/{{key.client_id}}/metrics/requests/count"
    auth: "header:x-api-key"
  metadata_from_validation:
    name_path: "value"

- name: youtube
  category: api
  key_prefixes: ["AIza"]
  key_patterns: ["^AIza[0-9A-Za-z_-]{35}$"]
  validation:
    method: GET
    url: "https://www.googleapis.com/youtube/v3/activities?part=contentDetails&maxResults=1&channelId=UC-lHJZR3Gqxm24_Vd_AJ5Yw&key={{key}}"
    auth: "none"
  metadata_from_validation:
    name_path: "kind"

- name: appcenter
  category: developer
  key_patterns: ["^[a-f0-9]{40}$"]
  validation:
    method: GET
    url: "https://api.appcenter.ms/v0.1/user"
    auth: "header:X-API-Token"
    metadata_from_validation:
      name_path: "display_name"
      email_path: "email"

- name: pivotaltracker
  category: productivity
  key_patterns: ["^[a-f0-9]{32}$"]
  validation:
    method: GET
    url: "https://www.pivotaltracker.com/services/v5/me"
    auth: "header:X-TrackerToken"
    metadata_from_validation:
      name_path: "name"
      email_path: "email"

- name: grafana
  category: monitoring
  key_prefixes: ["glc_", "glsa_", "glapi_"]
  key_patterns: ["^(glc_|glsa_|glapi_)[a-zA-Z0-9+/=]{32,120}$", "^eyJ[a-zA-Z0-9._-]{100,500}$"]
  validation:
    method: GET
    url: "https://grafana.com/api/user"
    auth: "bearer"
    metadata_from_validation:
      name_path: "login"
      email_path: "email"

- name: bazaarvoice
  category: api
  key_patterns: ["^[a-zA-Z0-9]{32,50}$"]
  validation:
    method: GET
    url: "https://which-cpv-api.bazaarvoice.com/clientInfo"
    auth: "query:conversationspasskey"
    metadata_from_validation:
      name_path: "client"

- name: linkedin_oauth
  category: social
  key_patterns: ["^[a-zA-Z0-9]{12,20}:[a-zA-Z0-9]{16,25}$"]
  validation:
    method: POST
    url: "https://www.linkedin.com/oauth/v2/accessToken"
    auth: "none"
    headers:
      Content-Type: "application/x-www-form-urlencoded"
    body: "grant_type=client_credentials&client_id={{key.client_id}}&client_secret={{key.secret}}"

- name: bing_maps
  category: maps
  key_patterns: ["^[a-zA-Z0-9_-]{64}$"]
  validation:
    method: GET
    url: "https://dev.virtualearth.net/REST/v1/Locations?CountryRegion=US&adminDistrict=WA&locality=Somewhere&postalCode=98001&addressLine=100%20Main%20St.&key={{key}}"
    auth: "none"
  metadata_from_validation:
    name_path: "statusCode"

- name: iterable
  category: marketing
  key_patterns: ["^[a-f0-9]{32}$"]
  validation:
    method: GET
    url: "https://api.iterable.com/api/users/me"
    auth: "header:Api-Key"
  metadata_from_validation:
    name_path: "user.email"
    email_path: "user.email"

- name: weglot
  category: api
  key_patterns: ["^wg_[a-f0-9]{32}$"]
  validation:
    method: POST
    url: "https://api.weglot.com/translate"
    auth: "query:api_key"
    headers:
      Content-Type: "application/json"
    body: '{"l_from":"en","l_to":"fr","request_url":"https://www.website.com/","words":[{"w":"This is a test","t":1}]}'
  metadata:
    - method: GET
      url: "https://api.weglot.com/projects"
      auth: "query:api_key"
      extract: "0.name"
      store_as: "name"

- name: helpscout_oauth
  category: support
  key_patterns: ["^[a-f0-9]{32}:[a-f0-9]{40}$", "^[a-f0-9]{32}:[a-zA-Z0-9_-]{40}$"]
  validation:
    method: POST
    url: "https://api.helpscout.net/v2/oauth2/token"
    auth: "none"
    headers:
      Content-Type: "application/x-www-form-urlencoded"
    body: "grant_type=client_credentials&client_id={{key.client_id}}&client_secret={{key.secret}}"
    metadata_from_validation:
      name_path: "token_type"

- name: amplitude
  category: analytics
  key_patterns: ["^[a-f0-9]{32}:[a-f0-9]{32}$"]
  validation:
    method: GET
    url: "https://amplitude.com/api/2/export?start=20200201T5&end=20210203T20"
    auth: "basic_composite"
  metadata:
    - method: GET
      url: "https://amplitude.com/api/2/projects"
      auth: "basic_composite"
      extract: "projects.0.name"
      store_as: "name"

- name: fofa
  category: security
  key_patterns: ["^[a-zA-Z0-9._%+-]+:[a-f0-9]{32}$"]
  validation:
    method: GET
    url: "https://fofa.info/api/v1/info/my?email={{key.client_id}}&key={{key.secret}}"
    auth: "none"
  metadata_from_validation:
    name_path: "username"
    email_path: "email"
    balance_path: "vip_level"

- name: zoomeye
  category: security
  key_patterns: ["^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$"]
  validation:
    method: GET
    url: "https://api.zoomeye.org/user/info"
    auth: "header:API-KEY"
  metadata_from_validation:
    name_path: "username"
    email_path: "email"
    balance_path: "quota"

- name: netlas
  category: security
  key_patterns: ["^[a-zA-Z0-9]{32,40}$"]
  validation:
    method: GET
    url: "https://app.netlas.io/api/user/profile/"
    auth: "header:X-API-Key"
  metadata_from_validation:
    name_path: "username"
    email_path: "email"
    balance_path: "credits"

- name: intelligence_x
  category: security
  key_patterns: ["^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$", "^[a-f0-9]{32}$"]
  validation:
    method: GET
    url: "https://free.intelx.io/authenticate/info"
    auth: "header:x-key"
  metadata_from_validation:
    name_path: "name"
    balance_path: "credits"

- name: digitalocean
  category: cloud
  key_patterns: ["^[a-zA-Z0-9_-]{64}$"]
  validation:
    method: GET
    url: "https://api.digitalocean.com/v2/account"
    auth: "bearer"
  metadata_from_validation:
    name_path: "account.name"
    email_path: "account.email"

- name: virustotal
  category: security
  key_patterns: ["^[a-f0-9]{32}$"]
  validation:
    method: GET
    url: "https://www.virustotal.com/api/v3/users"
    auth: "header:x-apikey"
  metadata_from_validation:
    name_path: "data.0.id"
    email_path: "data.0.attributes.email"

- name: censys
  category: security
  key_patterns: ["^[a-zA-Z0-9]{50,}$"]
  validation:
    method: GET
    url: "https://api.censys.io/v3/account"
    auth: "bearer"
  metadata_from_validation:
    name_path: "login"
    email_path: "email"

- name: discord
  category: communication
  key_patterns: ["^MFI[a-zA-Z0-9]{20,}$"]
  validation:
    method: GET
    url: "https://discord.com/api/v10/users/@me"
    auth: "bearer"
  metadata_from_validation:
    name_path: "username"
    email_path: "email"

- name: slack
  category: communication
  key_patterns: ["^xoxb-[a-zA-Z0-9-]+$"]
  validation:
    method: GET
    url: "https://slack.com/api/auth.test"
    auth: "bearer"
  metadata_from_validation:
    name_path: "team"
    email_path: "user"

- name: mixpanel
  category: analytics
  key_patterns: ["^[a-f0-9]{32}$"]
  validation:
    method: GET
    url: "https://api.mixpanel.com/engage#profile-set"
    auth: "query:token"
  metadata_from_validation:
    name_path: "status"
