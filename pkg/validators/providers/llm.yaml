- name: anthropic
  category: llm
  key_prefixes: ["sk-ant-", "anthropic-"]
  key_patterns: ["^anthropic-", "^sk-ant-"]
  validation:
    method: POST
    url: "https://api.anthropic.com/v1/messages"
    auth: "header:x-api-key"
    headers:
      anthropic-version: "2023-06-01"
      content-type: "application/json"
    body: '{"model":"claude-sonnet-4-6","max_tokens":1,"messages":[{"role":"user","content":"Hi"}]}'
  metadata:
    - url: "https://console.anthropic.com/api/organizations/{{header.anthropic-organization-id}}/prepaid/credits"
      method: GET
      auth: "header:x-api-key"
      headers:
        anthropic-version: "2023-06-01"
      balance_path: "data.0.amount"

- name: deepseek
  category: llm
  key_prefixes: ["sk-"]
  key_patterns: ["^sk-[a-fA-F0-9]{32}$"]
  validation:
    method: POST
    url: "https://api.deepseek.com/chat/completions"
    auth: "bearer"
    body: '{"model":"deepseek-chat","messages":[{"role":"user","content":"Hi"}],"max_tokens":1}'
  metadata:
    - url: "https://api.deepseek.com/user/balance"
      method: GET
      auth: "bearer"
      balance_path: "balance_infos.0.total_balance"

- name: openrouter
  category: llm
  key_prefixes: ["sk-or-"]
  key_patterns: ["^sk-or-"]
  validation:
    method: GET
    url: "https://openrouter.ai/api/v1/key"
    auth: "bearer"
  metadata_from_validation:
    balance_path: "data.limit"
    balance_subtract_path: "data.usage"

- name: gemini
  category: llm
  key_prefixes: ["AIza"]
  key_patterns: ["^AIza[a-zA-Z0-9_-]{35}$"]
  validation:
    method: GET
    url: "https://generativelanguage.googleapis.com/v1beta/models?key={{key}}"
    auth: "none"
  metadata_from_validation:
    name_path: "models.0.name"

- name: huggingface
  category: ai
  key_prefixes: ["hf_"]
  key_patterns: ["^hf_"]
  validation:
    method: GET
    url: "https://huggingface.co/api/whoami-v2"
    auth: "bearer"
  metadata_from_validation:
    name_path: "fullname"
    name_fallback_path: "name"
    email_path: "email"

- name: xai
  category: llm
  key_prefixes: ["xai-"]
  key_patterns: ["^xai-"]
  validation:
    method: POST
    url: "https://api.x.ai/v1/chat/completions"
    auth: "bearer"
    body: '{"model":"grok-4-1-fast-non-reasoning","messages":[{"role":"user","content":"Hi"}],"max_tokens":1}'
  metadata:
    - url: "https://api.x.ai/v1/teams"
      method: GET
      auth: "bearer"
      extract: "data.0.id"
      store_as: "team_id"
    - url: "https://management-api.x.ai/v1/billing/teams/{{team_id}}/prepaid-credits"
      method: GET
      auth: "bearer"
      balance_path: "total_amount"

